<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заявка в Lost Signal Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(ellipse at 30% 40%, #1f1535 0%, #0a0518 100%);
            font-family: 'Inter', sans-serif;
            color: #eef2ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .form-container {
            max-width: 900px;
            width: 100%;
            background: rgba(18, 12, 35, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .form-title {
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #FFFFFF, #d8b4fe, #a855f7);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .form-subtitle {
            text-align: center;
            color: #c4b5fd;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .form-container iframe {
            width: 100%;
            height: 850px;
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 20px;
            background: rgba(0,0,0,0.2);
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: #a78bfa;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover {
            color: #c084fc;
        }
        @media (max-width: 600px) {
            .form-container { padding: 1rem; }
            .form-container iframe { height: 700px; }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1 class="form-title">📝 Заявка в студию</h1>
        <p class="form-subtitle">Заполните форму, и мы свяжемся с вами в Discord</p>
        <!-- ЗДЕСЬ ВСТАВЛЕН ВАШ КОД ФОРМЫ -->
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSc4uR_qOo72_glXOGXvVkrMQWeqGCkQjVowUQb1n9SuSbMphw/viewform?embedded=true" width="100%" height="850" frameborder="0" marginheight="0" marginwidth="0">Загрузка...</iframe>
        <a href="https://lostsignalstudio.github.io/lost-signal-studio/" class="back-link">← Вернуться на главную</a>
    </div>
</body>
</html>
